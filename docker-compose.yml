services:
  db:
    platform: linux/amd64
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: lifeloop
      POSTGRES_USER: lifeloop
      POSTGRES_PASSWORD: lifeloop
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifeloop -d lifeloop"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5433:5432"
    volumes:
      - lifeloop_db_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://lifeloop:lifeloop@db:5432/lifeloop
      GRID_SIZE_METERS: 350
      APP_ENV: docker
      SOCIAL_AGENT_API_KEY: ${SOCIAL_AGENT_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SOCIAL_AGENT_MODEL: ${SOCIAL_AGENT_MODEL:-gpt-4.1-mini}
      SOCIAL_AGENT_BASE_URL: ${SOCIAL_AGENT_BASE_URL:-https://api.openai.com/v1}
      SOCIAL_AGENT_TIMEOUT_SECONDS: ${SOCIAL_AGENT_TIMEOUT_SECONDS:-20}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      GOOGLE_PLACES_SEARCH_RADIUS_METERS: ${GOOGLE_PLACES_SEARCH_RADIUS_METERS:-1500}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/migrations:/app/migrations

  web:
    build:
      context: .
    depends_on:
      - api
    ports:
      - "8080:8080"

volumes:
  lifeloop_db_data:
